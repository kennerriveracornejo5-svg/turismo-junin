<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Niños - Zapateria Alondra</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="estilos.css" />
  </head>

  <body>
    <div class="navegador">
      <div class="barra">
        <p id="frase"></p>
      </div>

      <header class="header">
        <div class="logo">
          <a href="index.html">
            <img src="img/logo.png" alt="logo" />
          </a>
        </div>

        <div class="hamburguesa" id="hamburguesa">☰</div>

        <nav class="menu" id="menu">
          <a href="mujer.html">Mujer</a>
          <a href="hombre.html">Hombre</a>
          <a href="ninos.html">Niños</a>
        </nav>
      </header>
    </div>

    <div class="overlay" id="overlay"></div>

    <div style="padding-top: 160px"></div>

    <!-- HERO -->
    <section class="mujer-hero">
      <div class="hero-text">
        <span>NUEVA COLECCIÓN</span>
        <h1>NIÑOS</h1>
        <p>Comodidad y diversión en cada paso.</p>
        <button>COMPRAR AHORA</button>
      </div>

      <img src="img/zapa3.png" class="hero-img" />
    </section>

    <!-- FILTROS -->
    <section class="filtros">
      <button class="active" data-filtro="todo">TODO</button>
      <button data-filtro="running">RUNNING</button>
      <button data-filtro="casual">CASUAL</button>
      <button data-filtro="deportivo">DEPORTIVO</button>
    </section>

    <!-- PRODUCTOS -->
    <section class="productos-mujer">
      <div class="card" data-categoria="casual">
        <img src="img/zapa1.png" />
        <h3>Casual Kids</h3>
        <p class="old">S/ 90</p>
        <p class="price">S/ 60</p>
      </div>

      <div class="card" data-categoria="running">
        <img src="img/zapa2.png" />
        <h3>Running Kids</h3>
        <p class="old">S/ 110</p>
        <p class="price">S/ 75</p>
      </div>

      <div class="card" data-categoria="deportivo">
        <img src="img/zapa3.png" />
        <h3>Deportivo Kids</h3>
        <p class="old">S/ 100</p>
        <p class="price">S/ 70</p>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
