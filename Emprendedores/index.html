<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zapateria Alondra</title>
    <link rel="stylesheet" href="estilos.css" />
  </head>
  <body style="height: 1500px">
    <div class="navegador">
      <!-- BARRA NEGRA -->
      <div class="barra">
        <p id="frase"></p>
      </div>

      <!-- HEADER -->
      <header class="header">
        <div class="logo">
          <a href="../index.html">
            <img src="../img/logo.png" alt="logo" />
          </a>
        </div>

        <div class="hamburguesa" id="hamburguesa">☰</div>

        <nav class="menu" id="menu">
          <a href="../mujer.html">Mujer</a>
          <a href="../hombre.html">Hombre</a>
          <a href="#">Juvenil</a>
          <a href="../niño.html">Niños</a>
          <a href="#">Promociones</a>
          <a href="#" class="extra">Nuestras tiendas</a>
          <a href="index.html" class="extra">Zona emprendedores</a>
        </nav>
      </header>
    </div>
    <!--  FONDO OSCURO -->
    <div class="overlay" id="overlay"></div>

    <div class="zona">
      <h2>Zona Emprendedores</h2>

      <div class="banner">
        <img src="../img/emprendedores.png" alt="Banner" />
      </div>
    </div>

    <div class="form-container">
      <form>
        <div class="row">
          <div class="field">
            <label>Nombre</label>
            <input type="text" />
          </div>
          <div class="field">
            <label>Apellidos</label>
            <input type="text" />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Correo</label>
            <input type="email" />
          </div>
          <div class="field">
            <label>Teléfono</label>
            <input type="text" />
          </div>
          <div class="field">
            <label>DNI</label>
            <input type="text" />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Departamento</label>
            <input type="text" />
          </div>
          <div class="field">
            <label>Provincia</label>
            <input type="text" />
          </div>
          <div class="field">
            <label>Distrito</label>
            <input type="text" />
          </div>
        </div>

        <div class="row">
          <div class="field full">
            <label>Mensaje</label>
            <textarea></textarea>
          </div>
        </div>

        <div class="row checkbox">
          <input type="checkbox" id="terms" />
          <label for="terms">
            He leído y estoy de acuerdo con los
            <a href="#">términos y condiciones</a> de la web.
          </label>
        </div>

        <button type="submit">ENVIAR MENSAJE</button>
      </form>
    </div>
    <script src="../script.js"></script>
  </body>
</html>
