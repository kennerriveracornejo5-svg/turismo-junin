<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tienda Sneakers</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>SNEAKERS STORE</h1>
      <input type="text" id="buscador" placeholder="Buscar zapatillas..." />
      <div id="carrito">🛒 <span id="contador">0</span></div>
    </header>
    <section class="hero">
      <h2>🔥 Ofertas en Zapatillas</h2>
      <p>Hasta 50% de descuento hoy</p>
    </section>
    <section class="productos" id="productos"></section>

    <!-- MODAL -->
    <div id="modal" class="modal">
      <div class="modal-content">
        <span id="cerrar">&times;</span>
        <img id="imgModal" />
        <h2 id="tituloModal"></h2>
        <p id="precioModal"></p>
        <button onclick="agregarCarrito()">Agregar al carrito</button>
      </div>
    </div>

    <!-- MODAL PAGO -->
    <div id="pagoModal" class="modal">
      <div class="modal-content">
        <span onclick="cerrarPago()">&times;</span>
        <h2>Pagar pedido</h2>

        <p>Total: <strong id="totalPago"></strong></p>

        <h3>📱 Yape</h3>
        <img src="img/yapel.png" class="qr" />

        <h3>📱 Plin</h3>
        <img src="img/plin.png" class="qr" />

        <p>Luego de pagar, envía tu comprobante:</p>

        <input type="text" id="nombreCliente" placeholder="Tu nombre" />
        <input type="file" id="comprobante" />

        <button onclick="confirmarPedido()">Confirmar Pedido</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
