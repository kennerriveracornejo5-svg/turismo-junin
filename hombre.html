<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hombre - Zapateria Alondra</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="estilos.css"/>
</head>

<body>

<div class="navegador">
  <div class="barra">
    <p id="frase"></p>
  </div>

  <header class="header">
    <div class="logo">
      <img src="img/logo.png"/>
    </div>

    <div class="hamburguesa" id="hamburguesa">☰</div>

    <nav class="menu" id="menu">
      <a href="mujer.html">Mujer</a>
      <a href="hombre.html">Hombre</a>
      <a href="ninos.html">Niños</a>
    </nav>
  </header>
</div>

<div class="overlay" id="overlay"></div>

<div style="padding-top:160px;"></div>

<!-- HERO -->
<section class="mujer-hero">
  <div class="hero-text">
    <span>NUEVA COLECCIÓN</span>
    <h1>HOMBRE</h1>
    <p>Rendimiento y estilo urbano.</p>
    <button>COMPRAR AHORA</button>
  </div>

  <img src="img/zapa2.png" class="hero-img"/>
</section>

<!-- FILTROS -->
<section class="filtros">
  <button class="active" data-filtro="todo">TODO</button>
  <button data-filtro="running">RUNNING</button>
  <button data-filtro="casual">CASUAL</button>
  <button data-filtro="deportivo">DEPORTIVO</button>
</section>

<!-- PRODUCTOS -->
<section class="productos-mujer">

  <div class="card" data-categoria="running">
    <img src="img/zapa2.png">
    <h3>Running Pro</h3>
    <p class="old">S/ 180</p>
    <p class="price">S/ 120</p>
  </div>

  <div class="card" data-categoria="casual">
    <img src="img/zapa1.png">
    <h3>Casual Urbano</h3>
    <p class="old">S/ 140</p>
    <p class="price">S/ 90</p>
  </div>

  <div class="card" data-categoria="deportivo">
    <img src="img/zapa3.png">
    <h3>Deportivo Fit</h3>
    <p class="old">S/ 160</p>
    <p class="price">S/ 110</p>
  </div>

</section>

<script src="script.js"></script>
</body>
</html>
