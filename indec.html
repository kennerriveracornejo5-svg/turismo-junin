<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zapateria Alondra</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="estilos.css" />
  </head>

  <body>
    <div class="navegador">
      <!-- BARRA NEGRA -->
      <div class="barra">
        <p id="frase"></p>
      </div>

      <!-- HEADER -->
      <header class="header">
        <div class="logo">
          <a href="index.html">
            <img src="img/logo.png" alt="logo" />
          </a>
        </div>

        <div class="hamburguesa" id="hamburguesa">☰</div>

        <nav class="menu" id="menu">
          <a href="mujer.html">Mujer</a>
          <a href="#">Hombre</a>
          <a href="#">Juvenil</a>
          <a href="#">Niños</a>
          <a href="#">Promociones</a>
          <a href="#" class="extra">Nuestras tiendas</a>
          <a href="Emprendedores/index.html" class="extra"
            >Zona emprendedores</a
          >
        </nav>
      </header>
    </div>
    <!--  FONDO OSCURO -->
    <div class="overlay" id="overlay"></div>
    <div class="carrusel">
      <div class="principal">
        <div class="slider-container">
          <div class="slider" id="slider">
            <img src="img/baner.png" />
            <img src="img/zapa1.png" />
            <img src="img/zapa2.png" />
            <img src="img/zapa3.png" />
          </div>

          <!-- botones -->
          <button class="btn prev" onclick="mover(-1)">❮</button>
          <button class="btn next" onclick="mover(1)">❯</button>

          <!-- dots -->
          <div class="dots" id="dots"></div>
        </div>
      </div>
    </div>

    <!-- CONTAINER -->

    <div class="container">
      <div class="tabs">
        <button class="tab active">MEJORES PRECIOS</button>
        <button class="tab">NOVEDADES</button>
      </div>

      <div class="arrows">
        <div class="arrow" id="prev">&#10094;</div>
        <div class="arrow" id="next">&#10095;</div>
      </div>
    </div>

    <!-- CONTENEDOR GENERAL -->

    <div class="shop-wrapper">
      <!-- PRODUCTOS -->
      <div class="product-grid">
        <div class="product-card">
          <div class="product-discount">-47%</div>
          <img
            class="product-image"
            src="https://via.placeholder.com/200x120"
            alt=""
          />
          <div class="product-name">Zapatillas Freestyle Mujer</div>
          <div class="product-old-price">$169.00</div>
          <div class="product-price">$89.00</div>
        </div>

        <div class="product-card">
          <div class="product-discount">-50%</div>
          <img
            class="product-image"
            src="https://via.placeholder.com/200x120"
            alt=""
          />
          <div class="product-name">Zapatillas Running Hombre</div>
          <div class="product-old-price">$199.00</div>
          <div class="product-price">$99.00</div>
        </div>

        <div class="product-card">
          <div class="product-discount">-41%</div>
          <img
            class="product-image"
            src="https://via.placeholder.com/200x120"
            alt=""
          />
          <div class="product-name">Zapatillas Juvenil</div>
          <div class="product-old-price">$169.00</div>
          <div class="product-price">$99.00</div>
        </div>

        <div class="product-card">
          <div class="product-discount">-41%</div>
          <img
            class="product-image"
            src="https://via.placeholder.com/200x120"
            alt=""
          />
          <div class="product-name">Zapatillas Freestyle Hombre</div>
          <div class="product-old-price">$169.00</div>
          <div class="product-price">$99.00</div>
        </div>
      </div>

      <!-- CATEGORÍAS -->
      <div class="category-grid">
        <div class="category-card">
          <img class="category-image" src="img/deporte.png" alt="" />
          <span class="category-label">Fútbol</span>
        </div>

        <div class="category-card">
          <img
            class="category-image"
            src="https://via.placeholder.com/400x300"
            alt=""
          />
          <span class="category-label">Training</span>
        </div>

        <div class="category-card">
          <img
            class="category-image"
            src="https://via.placeholder.com/400x300"
            alt=""
          />
          <span class="category-label">Outdoor</span>
        </div>

        <div class="category-card">
          <img
            class="category-image"
            src="https://via.placeholder.com/400x300"
            alt=""
          />
          <span class="category-label">Running</span>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
